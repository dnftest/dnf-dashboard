<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>던파 시세 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff;
      --text-sub: #a0a0a0; --accent-color: #4da6ff; --part-bg: #333333;
      --part-text: #e0e0e0; --up-color: #ff4d4d; --down-color: #4da6ff;
      --border-color: #333333;
    }
    body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); }
    
    .header-container { position: sticky; top: 0; background-color: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px); padding: 20px 20px 10px 20px; border-bottom: 1px solid var(--border-color); z-index: 100; }
    .header-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 15px auto; flex-wrap: wrap; gap: 10px; }
    .header-top h1 { margin: 0; font-size: 24px; letter-spacing: -0.5px; }
    
    .search-container { flex: 1; max-width: 300px; margin: 0 15px; position: relative; }
    .search-input { width: 100%; box-sizing: border-box; background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px 15px 10px 35px; border-radius: 8px; font-size: 14px; transition: all 0.2s ease; }
    .search-input:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 2px rgba(77, 166, 255, 0.2); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-sub); }

    .refresh-btn { background-color: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; min-width: 150px; transition: all 0.2s ease; }
    .refresh-btn:hover { background-color: #2a2a2a; border-color: var(--text-sub); }
    
    /* 💡 시스템 안내(유의사항) 패널 닫기 버튼 대응 디자인 */
    .notice-panel {
      position: relative; /* [X] 버튼 배치를 위한 기준점 */
      max-width: 1200px; margin: 0 auto 15px auto; padding: 12px 35px 12px 16px;
      background-color: rgba(77, 166, 255, 0.05); border: 1px solid rgba(77, 166, 255, 0.3);
      border-radius: 8px; font-size: 13px; color: var(--text-sub); line-height: 1.6;
    }
    .notice-panel strong { color: var(--accent-color); font-weight: 600; }
    .notice-title { font-weight: 700; color: var(--text-main); margin-bottom: 4px; display: block; font-size: 14px; }
    
    /* 💡 안내문 닫기 버튼 */
    .notice-close-btn {
      position: absolute; top: 10px; right: 12px; background: transparent; border: none;
      color: var(--text-sub); font-size: 18px; cursor: pointer; padding: 0; line-height: 1; transition: color 0.2s ease;
    }
    .notice-close-btn:hover { color: var(--text-main); }

    .tabs-container { display: flex; gap: 10px; max-width: 1200px; margin: 0 auto; overflow-x: auto; padding-bottom: 8px; }
    .tabs-container::-webkit-scrollbar { height: 6px; }
    .tabs-container::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
    .tabs-container::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    .tab-btn { background-color: transparent; color: var(--text-sub); border: 1px solid transparent; padding: 8px 16px; border-radius: 20px; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s ease; flex-shrink: 0; }
    .tab-btn.active { background-color: rgba(77, 166, 255, 0.1); color: var(--accent-color); border-color: var(--accent-color); }

    .content-wrapper { padding: 20px; max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    
    .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: all 0.2s ease; cursor: pointer; position: relative; overflow: hidden; }
    .card:hover { transform: translateY(-4px); border-color: var(--accent-color); }
    
    .card-loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30,30,30,0.8); display: none; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: var(--accent-color); z-index: 10; backdrop-filter: blur(2px); }

    .card-header { display: flex; justify-content: flex-start; align-items: center; gap: 8px; margin-bottom: 8px; }
    .card-category { font-size: 12px; color: var(--accent-color); font-weight: 600; }
    .part-badge { background-color: var(--part-bg); color: var(--part-text); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
    .item-name { font-size: 16px; font-weight: 600; margin-bottom: 15px; }
    .price-container { display: flex; justify-content: space-between; align-items: flex-end; }
    .price { font-size: 22px; font-weight: 700; }
    .change { font-size: 14px; font-weight: 600; }
    .up { color: var(--up-color); } .down { color: var(--down-color); } .flat { color: var(--text-sub); }
    
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7); z-index: 9999; justify-content: center; align-items: center;
      backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.2s ease;
    }
    .modal-overlay.show { opacity: 1; }
    
    .modal-content {
      background-color: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 16px; padding: 25px; width: 90%; max-width: 800px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative;
      transform: translateY(20px); transition: transform 0.2s ease;
    }
    .modal-overlay.show .modal-content { transform: translateY(0); }

    .modal-close-btn {
      position: absolute; top: 20px; right: 20px; background: transparent; border: none;
      color: var(--text-sub); font-size: 24px; cursor: pointer; line-height: 1; transition: color 0.2s ease;
    }
    .modal-close-btn:hover { color: var(--up-color); }

    .chart-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; padding-right: 30px; }
    .chart-title { font-size: 20px; font-weight: 700; color: var(--accent-color); }
    .chart-subtitle { font-size: 13px; color: var(--text-sub); }
    canvas { max-height: 350px; width: 100%; }

    @media (max-width: 600px) { 
      .search-container { max-width: 100%; margin: 10px 0; order: 3; } 
      .header-top { justify-content: space-between; } 
      .modal-content { padding: 15px; }
      canvas { max-height: 250px; }
    }
  </style>
</head>
<body>

  <div class="header-container">
    <div class="header-top">
      <h1>던파 시세 대시보드</h1>
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="아이템 검색 (예: 무큐, 조결)" autocomplete="off">
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="fetchData()"><span>🔄 새로고침</span></button>
    </div>

    <div class="notice-panel" id="noticePanel">
      <button class="notice-close-btn" onclick="closeNotice()" title="다시 보지 않기">✕</button>
      <span class="notice-title">📢 대시보드 이용 안내</span>
      • <strong>트래픽 방어:</strong> 서버의 안정성을 위해 실시간 가격은 <strong>5분 단위</strong>로 갱신됩니다.<br>
      • <strong>스마트 절전:</strong> 다른 창을 보거나 게임 중일 때는 서버 한도 보호를 위해 실시간 갱신이 일시 대기 상태로 전환됩니다. (화면 복귀 시 즉시 재개)<br>
      • <strong>시세 차트 & 검색:</strong> 카드를 클릭하여 1시간 간격의 차트(10:00~02:00)를 확인하고, '무큐', '라코', '12증' 등 은어로 검색해 보세요.
    </div>

    <div class="tabs-container" id="tabs"></div>
  </div>

  <div class="content-wrapper">
    <div class="grid-container" id="dashboard"><div style="text-align:center; padding: 60px 0; color: #a0a0a0;">데이터를 불러오는 중입니다...</div></div>
  </div>

  <div class="modal-overlay" id="chartModal">
    <div class="modal-content">
      <button class="modal-close-btn" onclick="closeModal()">&times;</button>
      <div class="chart-header">
        <div class="chart-title" id="chartTitle">아이템 변동 추이</div>
        <div class="chart-subtitle">10:00 ~ 02:00 (1시간 간격)</div>
      </div>
      <canvas id="priceChart"></canvas>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxQnFdUotaLTWhYhkzJkbr8kWb6r4FDhn5KD0hIzxyG4NtPdzbZ0GKMAIgelgygphSrJA/exec";
    
    let globalData = []; 
    let currentCategory = '전체';
    let priceChartInstance = null; 
    let countdownTimer = null, autoFetchTimer = null;
    let timeLeft = 300; // 💡 5분(300초)으로 변경
    let isPageActive = true; 

    const searchAliases = {
      "무큐": "무색 큐브 조각", "흰큐": "흰색 큐브 조각", "적큐": "적색 큐브 조각", "청큐": "청색 큐브 조각", "흑큐": "흑색 큐브 조각", "황큐": "황금 큐브 조각", "단무지": "황금 큐브 조각",
      "라코": "라이언 코어", "응라코": "응축된 라이언 코어", "조결": "조화의 결정체", "모순": "모순의 결정체", "힘정": "힘의 정수", "에소": "에픽 소울", "농원큐": "농밀한 이계의 정수", "골베": "골든 베릴", "무결골베": "무결점 골든 베릴",
      "증보권": "장비 증폭 보호권", "장보권": "장비 보호권", "황증": "순수한 황금 증폭서", "순황증": "순수한 황금 증폭서", "고황증": "고대의 황금 증폭서", "10증": "+10 장비 증폭권", "11증": "+11 장비 증폭권", "12증": "+12 장비 증폭권", "11강": "+11 장비 강화권", "12강": "+12 장비 강화권",
      "왜차큐": "왜곡된 차원의 큐브", "왜큐": "왜곡된 차원의 큐브", "이차큐": "이질적인 차원의 큐브", "단조": "불의 숨결 단조", "짙심": "짙은 심연의 편린", "클레압": "클론 레어 아바타", "찬엠블": "찬란한 엠블렘", "화엠블": "화려한 엠블렘", "플티": "플래티넘 엠블렘"
    };

    function formatNumber(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

    // 💡 안내문 닫기 및 로컬 메모리 저장 로직
    function closeNotice() {
      document.getElementById('noticePanel').style.display = 'none';
      localStorage.setItem('dnfNoticeClosed', 'true'); // 브라우저에 닫음 상태 기억
    }

    // 스크립트 실행 시 로컬 메모리 확인
    if(localStorage.getItem('dnfNoticeClosed') === 'true') {
      document.getElementById('noticePanel').style.display = 'none';
    }

    // 💡 타이머(초)를 MM:SS 형식으로 변환하는 함수
    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    async function fetchData() {
      if (!isPageActive) return;

      const dashboard = document.getElementById('dashboard');
      const refreshBtn = document.getElementById('refreshBtn');
      clearInterval(countdownTimer); clearInterval(autoFetchTimer);
      refreshBtn.innerHTML = '⏳ 갱신 중...'; refreshBtn.style.opacity = '0.7'; refreshBtn.disabled = true;

      try {
        const response = await fetch(API_URL + "?action=current&t=" + new Date().getTime());
        const resultJSON = await response.json();
        globalData = resultJSON.current;
        renderTabs(); 
        renderCards(); 
      } catch (error) {
        dashboard.innerHTML = `<div style="text-align:center; padding: 60px 0; color: #ff4d4d;">데이터 로드 실패</div>`;
      } finally {
        refreshBtn.style.opacity = '1'; refreshBtn.disabled = false;
        startAutoRefresh();
      }
    }

    function startAutoRefresh() {
      if (!isPageActive) return;
      const refreshBtn = document.getElementById('refreshBtn');
      timeLeft = 300; // 5분
      
      // 첫 시작 시 5:00 표시
      refreshBtn.innerHTML = `🔄 새로고침 (${formatTime(timeLeft)})`;
      
      countdownTimer = setInterval(() => { 
        timeLeft--; 
        if (timeLeft > 0) {
          refreshBtn.innerHTML = `🔄 새로고침 (${formatTime(timeLeft)})`; 
        }
      }, 1000);
      
      // 5분(300,000 밀리초)마다 데이터 갱신
      autoFetchTimer = setInterval(() => { fetchData(); }, 300000);
    }

    function handleVisibilityChange() {
      const refreshBtn = document.getElementById('refreshBtn');
      if (document.visibilityState === 'visible') {
        isPageActive = true;
        fetchData(); 
      } else {
        isPageActive = false;
        clearInterval(countdownTimer);
        clearInterval(autoFetchTimer);
        refreshBtn.innerHTML = `🔄 절전 모드 (대기)`;
        refreshBtn.style.opacity = '0.5';
      }
    }
    document.addEventListener('visibilitychange', handleVisibilityChange);

    function renderTabs() {
      const tabsContainer = document.getElementById('tabs');
      const categories = ['전체'];
      globalData.forEach(item => { if (!categories.includes(item.category)) categories.push(item.category); });
      tabsContainer.innerHTML = ''; 
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${cat === currentCategory ? 'active' : ''}`;
        btn.textContent = cat;
        btn.onclick = () => { currentCategory = cat; document.getElementById('searchInput').value = ''; renderTabs(); renderCards(); };
        tabsContainer.appendChild(btn);
      });
    }

    function renderCards() {
      const dashboard = document.getElementById('dashboard');
      dashboard.innerHTML = '';
      const rawSearchTerm = document.getElementById('searchInput').value.trim();
      const safeSearchTerm = rawSearchTerm.replace(/\s+/g, '');

      const filteredData = globalData.filter(item => {
        if (currentCategory !== '전체' && item.category !== currentCategory) return false;
        if (safeSearchTerm === '') return true;
        const itemNameSafe = item.name.replace(/\s+/g, '');
        let isMatch = itemNameSafe.includes(safeSearchTerm);
        for (let alias in searchAliases) {
          if (safeSearchTerm.includes(alias) && itemNameSafe.includes(searchAliases[alias].replace(/\s+/g, ''))) isMatch = true;
        }
        return isMatch;
      });

      if (filteredData.length === 0) { dashboard.innerHTML = `<div style="text-align:center; padding: 60px 0; color:#a0a0a0;">검색 결과가 없습니다.</div>`; return; }

      filteredData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => {
          document.getElementById(`loading-${index}`).style.display = 'flex';
          fetchAndRenderChart(item.name, `loading-${index}`);
        };
        let changeClass = 'flat'; let changeText = '-';
        if (item.change > 0) { changeClass = 'up'; changeText = `▲ ${formatNumber(item.change)}`; } 
        else if (item.change < 0) { changeClass = 'down'; changeText = `▼ ${formatNumber(Math.abs(item.change))}`; }
        const categoryBadge = currentCategory === '전체' ? `<div class="card-category">${item.category}</div>` : '';
        const partBadge = item.part ? `<div class="part-badge">${item.part}</div>` : '';
        card.innerHTML = `
          <div class="card-loading" id="loading-${index}">데이터 집계 중...⏳</div>
          <div class="card-header">${categoryBadge}${partBadge}</div>
          <div class="item-name">${item.name}</div>
          <div class="price-container">
            <div class="price">${formatNumber(item.price)}</div>
            <div class="change ${changeClass}">${changeText}</div>
          </div>
        `;
        dashboard.appendChild(card);
      });
    }

    async function fetchAndRenderChart(itemName, loadingId) {
      try {
        const response = await fetch(API_URL + "?action=history&item=" + encodeURIComponent(itemName) + "&t=" + new Date().getTime());
        const data = await response.json();
        document.getElementById(loadingId).style.display = 'none';
        openModal(itemName);
        renderChartCore(data.history.timestamps, data.history.prices);
      } catch (error) {
        const loadingEl = document.getElementById(loadingId);
        loadingEl.innerHTML = "데이터 로드 실패";
        setTimeout(() => { loadingEl.style.display = 'none'; }, 2000);
      }
    }

    function openModal(itemName) {
      const modal = document.getElementById('chartModal');
      document.getElementById('chartTitle').innerText = `${itemName} 일일 시세 추이`;
      modal.style.display = 'flex';
      setTimeout(() => { modal.classList.add('show'); }, 10);
    }
    function closeModal() {
      const modal = document.getElementById('chartModal');
      modal.classList.remove('show');
      setTimeout(() => { modal.style.display = 'none'; }, 200);
    }
    window.onclick = function(event) {
      const modal = document.getElementById('chartModal');
      if (event.target === modal) { closeModal(); }
    }
    function renderChartCore(rawTimes, rawPrices) {
      if(!rawTimes || !rawPrices || rawTimes.length === 0) return;
      const labels = [];
      const dataPoints = [];
      let lastHour = -1;
      for(let i=0; i<rawTimes.length; i++) {
        const date = new Date(rawTimes[i]);
        const hour = date.getHours();
        const isValidTime = (hour >= 10 && hour <= 23) || (hour >= 0 && hour <= 2);
        if (isValidTime && hour !== lastHour) {
          labels.push(`${hour < 10 ? '0'+hour : hour}:00`);
          let price = parseFloat(rawPrices[i]);
          if(isNaN(price) || price === 0) price = dataPoints.length > 0 ? dataPoints[dataPoints.length-1] : 0;
          dataPoints.push(price);
          lastHour = hour;
        }
      }
      if(priceChartInstance) priceChartInstance.destroy();
      const ctx = document.getElementById('priceChart').getContext('2d');
      let lineColor = '#4da6ff'; let bgColor = 'rgba(77, 166, 255, 0.1)';
      if(dataPoints.length > 1 && dataPoints[dataPoints.length-1] > dataPoints[0]) {
        lineColor = '#ff4d4d'; bgColor = 'rgba(255, 77, 77, 0.1)';
      }
      priceChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: '경매장가', data: dataPoints, borderColor: lineColor, backgroundColor: bgColor, borderWidth: 2,
            pointBackgroundColor: '#1e1e1e', pointBorderColor: lineColor, pointRadius: 4, pointHoverRadius: 6, fill: true, tension: 0.3
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(context) { return formatNumber(context.raw) + ' 골드'; } } } },
          scales: { x: { grid: { color: '#333' }, ticks: { color: '#a0a0a0' } }, y: { grid: { color: '#333' }, ticks: { color: '#a0a0a0', callback: function(value) { return formatNumber(value); } } } },
          interaction: { intersect: false, mode: 'index' }
        }
      });
    }

    document.getElementById('searchInput').addEventListener('input', () => { renderCards(); });
    const tabsContainer = document.getElementById('tabs');
    tabsContainer.addEventListener('wheel', (evt) => { if (evt.deltaY !== 0) { evt.preventDefault(); tabsContainer.scrollLeft += evt.deltaY; } });

    fetchData();
  </script>
</body>
</html>
