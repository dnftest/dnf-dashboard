<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>던파 시세 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff;
      --text-sub: #a0a0a0; --accent-color: #4da6ff; --part-bg: #333333;
      --part-text: #e0e0e0; --up-color: #ff4d4d; --down-color: #4da6ff;
      --border-color: #333333; --star-color: #ffd700;
    }
    body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); }
    
    .header-container { position: sticky; top: 0; background-color: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px); padding: 20px 20px 10px 20px; border-bottom: 1px solid var(--border-color); z-index: 100; }
    .header-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 15px auto; flex-wrap: wrap; gap: 10px; }
    .header-top h1 { margin: 0; font-size: 24px; letter-spacing: -0.5px; }
    
    .search-container { flex: 1; max-width: 300px; position: relative; }
    .search-input { width: 100%; box-sizing: border-box; background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px 15px 10px 35px; border-radius: 8px; font-size: 14px; transition: all 0.2s ease; }
    .search-input:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 2px rgba(77, 166, 255, 0.2); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-sub); }

    /* 💡 정렬 드롭다운 스타일 */
    .sort-select { background-color: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 9px 12px; border-radius: 8px; font-size: 14px; cursor: pointer; outline: none; transition: border-color 0.2s; }
    .sort-select:focus { border-color: var(--accent-color); }

    .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    
    .refresh-btn { background-color: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; min-width: 150px; transition: all 0.2s ease; }
    .refresh-btn:hover { background-color: #2a2a2a; border-color: var(--text-sub); }
    
    .notice-panel { position: relative; max-width: 1200px; margin: 0 auto 15px auto; padding: 12px 35px 12px 16px; background-color: rgba(77, 166, 255, 0.05); border: 1px solid rgba(77, 166, 255, 0.3); border-radius: 8px; font-size: 13px; color: var(--text-sub); line-height: 1.6; }
    .notice-panel strong { color: var(--accent-color); font-weight: 600; }
    .notice-title { font-weight: 700; color: var(--text-main); margin-bottom: 4px; display: block; font-size: 14px; }
    .notice-close-btn { position: absolute; top: 10px; right: 12px; background: transparent; border: none; color: var(--text-sub); font-size: 18px; cursor: pointer; padding: 0; line-height: 1; transition: color 0.2s ease; }
    .notice-close-btn:hover { color: var(--text-main); }

    .tabs-container { display: flex; gap: 10px; max-width: 1200px; margin: 0 auto; overflow-x: auto; padding-bottom: 8px; }
    .tabs-container::-webkit-scrollbar { height: 6px; }
    .tabs-container::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
    .tabs-container::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    .tab-btn { background-color: transparent; color: var(--text-sub); border: 1px solid transparent; padding: 8px 16px; border-radius: 20px; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s ease; flex-shrink: 0; }
    .tab-btn.active { background-color: rgba(77, 166, 255, 0.1); color: var(--accent-color); border-color: var(--accent-color); }
    /* 관심종목 탭 강조 */
    .tab-btn.fav-tab { color: var(--star-color); }
    .tab-btn.fav-tab.active { background-color: rgba(255, 215, 0, 0.1); border-color: var(--star-color); }

    .content-wrapper { padding: 20px; max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    
    .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: all 0.2s ease; cursor: pointer; position: relative; overflow: hidden; }
    .card:hover { transform: translateY(-4px); border-color: var(--accent-color); }
    
    /* 💡 관심종목 별 아이콘 */
    .fav-icon { position: absolute; top: 15px; right: 15px; font-size: 20px; color: var(--text-sub); cursor: pointer; transition: color 0.2s, transform 0.2s; z-index: 5; user-select: none; }
    .fav-icon:hover { transform: scale(1.2); }
    .fav-icon.active { color: var(--star-color); }

    .card-loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30,30,30,0.8); display: none; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: var(--accent-color); z-index: 10; backdrop-filter: blur(2px); }

    .card-header { display: flex; justify-content: flex-start; align-items: center; gap: 8px; margin-bottom: 8px; padding-right: 25px; }
    .card-category { font-size: 12px; color: var(--accent-color); font-weight: 600; }
    .part-badge { background-color: var(--part-bg); color: var(--part-text); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
    .item-name { font-size: 16px; font-weight: 600; margin-bottom: 15px; padding-right: 20px; word-break: keep-all; }
    .price-container { display: flex; justify-content: space-between; align-items: flex-end; }
    .price { font-size: 22px; font-weight: 700; }
    .change { font-size: 14px; font-weight: 600; }
    .up { color: var(--up-color); } .down { color: var(--down-color); } .flat { color: var(--text-sub); }
    
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.2s ease; }
    .modal-overlay.show { opacity: 1; }
    .modal-content { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 25px; width: 90%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; transform: translateY(20px); transition: transform 0.2s ease; }
    .modal-overlay.show .modal-content { transform: translateY(0); }
    .modal-close-btn { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: var(--text-sub); font-size: 24px; cursor: pointer; line-height: 1; transition: color 0.2s ease; }
    .modal-close-btn:hover { color: var(--up-color); }

    .chart-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; padding-right: 30px; flex-wrap: wrap; gap: 10px; }
    .chart-title-area { display: flex; flex-direction: column; gap: 4px; }
    .chart-title { font-size: 20px; font-weight: 700; color: var(--accent-color); }
    .chart-subtitle { font-size: 13px; color: var(--text-sub); }
    
    /* 💡 차트 통계(최고/최저가) 뱃지 */
    .chart-stats { display: flex; gap: 10px; }
    .stat-badge { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 6px; background-color: var(--part-bg); }
    .stat-badge.high { color: var(--up-color); border: 1px solid rgba(255, 77, 77, 0.3); }
    .stat-badge.low { color: var(--down-color); border: 1px solid rgba(77, 166, 255, 0.3); }
    
    canvas { max-height: 300px; width: 100%; margin-bottom: 20px; }

    /* 💡 수수료 계산기 UI */
    .calculator-panel { background-color: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: space-between; }
    .calc-input-group { display: flex; align-items: center; gap: 10px; }
    .calc-label { font-size: 14px; color: var(--text-sub); }
    .calc-input { background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; border-radius: 6px; font-size: 14px; width: 150px; outline: none; }
    .calc-input:focus { border-color: var(--accent-color); }
    .calc-result { font-size: 15px; }
    .calc-result strong { font-size: 18px; font-weight: 700; margin-left: 5px; }
    .profit-up { color: var(--up-color); }
    .profit-down { color: var(--down-color); }

    @media (max-width: 600px) { 
      .header-actions { width: 100%; justify-content: space-between; }
      .search-container { max-width: 100%; width: 100%; margin: 0; } 
      .sort-select { flex: 1; }
      .refresh-btn { flex: 1; min-width: auto; }
      .modal-content { padding: 15px; }
      canvas { max-height: 200px; }
      .calculator-panel { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="header-container">
    <div class="header-top">
      <h1>던파 시세 대시보드</h1>
      <div class="header-actions">
        <div class="search-container">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" class="search-input" placeholder="아이템 검색 (예: 무큐, 조결)" autocomplete="off">
        </div>
        <select id="sortSelect" class="sort-select" onchange="renderCards()">
          <option value="default">기본 정렬</option>
          <option value="up">급등순 (▲)</option>
          <option value="down">급락순 (▼)</option>
          <option value="highPrice">최고가순</option>
          <option value="lowPrice">최저가순</option>
        </select>
        <button class="refresh-btn" id="refreshBtn" onclick="fetchData()"><span>🔄 새로고침</span></button>
      </div>
    </div>

    <div class="notice-panel" id="noticePanel">
      <button class="notice-close-btn" onclick="closeNotice()" title="다시 보지 않기">✕</button>
      <span class="notice-title">📢 대시보드 이용 안내</span>
      • <strong>⭐ 관심종목:</strong> 카드 우측 상단의 별을 누르면 나만의 관심종목 탭에서 모아볼 수 있습니다.<br>
      • <strong>📈 스마트 정렬:</strong> 상단 드롭다운을 통해 급등/급락 재화를 1초 만에 포착하세요.<br>
      • <strong>🧮 실전 트레이딩:</strong> 차트 팝업 하단에 매입가를 입력하면 수수료(3%)를 제외한 순수익을 자동 계산합니다.
    </div>

    <div class="tabs-container" id="tabs"></div>
  </div>

  <div class="content-wrapper">
    <div class="grid-container" id="dashboard"><div style="text-align:center; padding: 60px 0; color: #a0a0a0;">데이터를 불러오는 중입니다...</div></div>
  </div>

  <div class="modal-overlay" id="chartModal">
    <div class="modal-content">
      <button class="modal-close-btn" onclick="closeModal()">&times;</button>
      <div class="chart-header">
        <div class="chart-title-area">
          <div class="chart-title" id="chartTitle">아이템 변동 추이</div>
          <div class="chart-subtitle">10:00 ~ 02:00 (1시간 간격)</div>
        </div>
        <div class="chart-stats">
          <div class="stat-badge high">당일 고가: <span id="modalHigh">0</span></div>
          <div class="stat-badge low">당일 저가: <span id="modalLow">0</span></div>
        </div>
      </div>
      
      <canvas id="priceChart"></canvas>
      
      <div class="calculator-panel">
        <div class="calc-input-group">
          <span class="calc-label">매입가 입력:</span>
          <input type="number" id="calcInput" class="calc-input" placeholder="얼마에 사셨나요?">
        </div>
        <div class="calc-result">
          현재가 매도 시 예상 순수익: <strong id="calcResult" class="flat">0 골드</strong>
          <span style="font-size:12px; color:var(--text-sub); margin-left:5px;">(수수료 3% 제외)</span>
        </div>
      </div>

    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxQnFdUotaLTWhYhkzJkbr8kWb6r4FDhn5KD0hIzxyG4NtPdzbZ0GKMAIgelgygphSrJA/exec";
    
    let globalData = []; 
    let currentCategory = '전체';
    let priceChartInstance = null; 
    let countdownTimer = null, autoFetchTimer = null;
    let timeLeft = 300; 
    let isPageActive = true; 
    
    // 💡 관심종목(Favorites) 저장소 초기화
    let favoriteItems = JSON.parse(localStorage.getItem('dnfFavorites')) || [];
    
    // 현재 모달에 띄워진 아이템의 최신 가격 (계산기용)
    let currentModalPrice = 0;

    const searchAliases = {
      "무큐": "무색 큐브 조각", "흰큐": "흰색 큐브 조각", "적큐": "적색 큐브 조각", "청큐": "청색 큐브 조각", "흑큐": "흑색 큐브 조각", "황큐": "황금 큐브 조각", "단무지": "황금 큐브 조각",
      "라코": "라이언 코어", "응라코": "응축된 라이언 코어", "조결": "조화의 결정체", "모순": "모순의 결정체", "힘정": "힘의 정수", "에소": "에픽 소울", "농원큐": "농밀한 이계의 정수", "골베": "골든 베릴", "무결골베": "무결점 골든 베릴",
      "증보권": "장비 증폭 보호권", "장보권": "장비 보호권", "황증": "순수한 황금 증폭서", "순황증": "순수한 황금 증폭서", "고황증": "고대의 황금 증폭서", "10증": "+10 장비 증폭권", "11증": "+11 장비 증폭권", "12증": "+12 장비 증폭권", "11강": "+11 장비 강화권", "12강": "+12 장비 강화권",
      "왜차큐": "왜곡된 차원의 큐브", "왜큐": "왜곡된 차원의 큐브", "이차큐": "이질적인 차원의 큐브", "단조": "불의 숨결 단조", "짙심": "짙은 심연의 편린", "클레압": "클론 레어 아바타", "찬엠블": "찬란한 엠블렘", "화엠블": "화려한 엠블렘", "플티": "플래티넘 엠블렘"
    };

    function formatNumber(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

    function closeNotice() {
      document.getElementById('noticePanel').style.display = 'none';
      localStorage.setItem('dnfNoticeClosed', 'true'); 
    }
    if(localStorage.getItem('dnfNoticeClosed') === 'true') {
      document.getElementById('noticePanel').style.display = 'none';
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // 💡 관심종목 토글 함수
    function toggleFavorite(itemName, event) {
      event.stopPropagation(); // 카드 클릭 이벤트(모달 열기) 방지
      const index = favoriteItems.indexOf(itemName);
      if (index > -1) {
        favoriteItems.splice(index, 1); // 제거
      } else {
        favoriteItems.push(itemName); // 추가
      }
      localStorage.setItem('dnfFavorites', JSON.stringify(favoriteItems));
      
      // 현재 탭이 '관심종목'인데 별을 해제했다면 탭을 갱신
      if (currentCategory === '⭐ 관심종목' && index > -1) {
        if (favoriteItems.length === 0) {
          currentCategory = '전체';
          renderTabs();
        }
      }
      renderCards();
    }

    async function fetchData() {
      if (!isPageActive) return;

      const dashboard = document.getElementById('dashboard');
      const refreshBtn = document.getElementById('refreshBtn');
      clearInterval(countdownTimer); clearInterval(autoFetchTimer);
      refreshBtn.innerHTML = '⏳ 갱신 중...'; refreshBtn.style.opacity = '0.7'; refreshBtn.disabled = true;

      try {
        const response = await fetch(API_URL + "?action=current&t=" + new Date().getTime());
        const resultJSON = await response.json();
        globalData = resultJSON.current;
        renderTabs(); 
        renderCards(); 
      } catch (error) {
        dashboard.innerHTML = `<div style="text-align:center; padding: 60px 0; color: #ff4d4d;">데이터 로드 실패</div>`;
      } finally {
        refreshBtn.style.opacity = '1'; refreshBtn.disabled = false;
        startAutoRefresh();
      }
    }

    function startAutoRefresh() {
      if (!isPageActive) return;
      const refreshBtn = document.getElementById('refreshBtn');
      timeLeft = 300; 
      refreshBtn.innerHTML = `🔄 새로고침 (${formatTime(timeLeft)})`;
      
      countdownTimer = setInterval(() => { 
        timeLeft--; 
        if (timeLeft > 0) refreshBtn.innerHTML = `🔄 새로고침 (${formatTime(timeLeft)})`; 
      }, 1000);
      autoFetchTimer = setInterval(() => { fetchData(); }, 300000);
    }

    function handleVisibilityChange() {
      const refreshBtn = document.getElementById('refreshBtn');
      if (document.visibilityState === 'visible') {
        isPageActive = true; fetchData(); 
      } else {
        isPageActive = false;
        clearInterval(countdownTimer); clearInterval(autoFetchTimer);
        refreshBtn.innerHTML = `🔄 절전 모드`; refreshBtn.style.opacity = '0.5';
      }
    }
    document.addEventListener('visibilitychange', handleVisibilityChange);

    function renderTabs() {
      const tabsContainer = document.getElementById('tabs');
      const categories = ['전체'];
      
      // 관심종목이 1개라도 있으면 탭 생성
      if (favoriteItems.length > 0) {
        categories.push('⭐ 관심종목');
      }
      
      globalData.forEach(item => { if (!categories.includes(item.category)) categories.push(item.category); });
      tabsContainer.innerHTML = ''; 
      
      categories.forEach(cat => {
        const btn = document.createElement('button');
        let classes = `tab-btn ${cat === currentCategory ? 'active' : ''}`;
        if (cat === '⭐ 관심종목') classes += ' fav-tab'; // 관심종목 탭 특수 스타일
        
        btn.className = classes;
        btn.textContent = cat;
        btn.onclick = () => { currentCategory = cat; document.getElementById('searchInput').value = ''; renderTabs(); renderCards(); };
        tabsContainer.appendChild(btn);
      });
    }

    function renderCards() {
      const dashboard = document.getElementById('dashboard');
      dashboard.innerHTML = '';
      const rawSearchTerm = document.getElementById('searchInput').value.trim();
      const safeSearchTerm = rawSearchTerm.replace(/\s+/g, '');
      const sortType = document.getElementById('sortSelect').value;

      // 1. 필터링 로직
      let filteredData = globalData.filter(item => {
        // 관심종목 탭 필터링
        if (currentCategory === '⭐ 관심종목') {
          if (!favoriteItems.includes(item.name)) return false;
        } else if (currentCategory !== '전체' && item.category !== currentCategory) {
          return false;
        }

        if (safeSearchTerm === '') return true;
        const itemNameSafe = item.name.replace(/\s+/g, '');
        let isMatch = itemNameSafe.includes(safeSearchTerm);
        for (let alias in searchAliases) {
          if (safeSearchTerm.includes(alias) && itemNameSafe.includes(searchAliases[alias].replace(/\s+/g, ''))) isMatch = true;
        }
        return isMatch;
      });

      //
